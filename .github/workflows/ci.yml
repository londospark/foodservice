name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-self-hosted:
    name: Test (self-hosted)
    runs-on:
      - self-hosted
      - linux
      - x64
      - hk-47
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: foodservice
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d foodservice"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install Rust CI tools
        uses: taiki-e/install-action@v2.75.18
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Run tests and generate coverage
        id: verification
        continue-on-error: true
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/foodservice
        run: cargo llvm-cov nextest --ignore-run-fail --workspace --profile ci --cobertura --output-path coverage.xml

      - name: Publish interactive test report
        id: test_report
        if: always() && hashFiles('target/nextest/ci/junit.xml') != ''
        continue-on-error: true
        uses: mikepenz/action-junit-report@v6.4.0
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Test Results
          require_tests: true
          require_passed_tests: true
          fail_on_parse_error: true
          fail_on_failure: true
          detailed_summary: true
          include_time_in_summary: true
          job_summary: true
          check_annotations: true

      - name: Publish coverage check
        id: coverage_report
        if: always() && hashFiles('coverage.xml') != ''
        continue-on-error: true
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('coverage.xml', 'utf8');

            const rootTag = xml.match(/<coverage\b([^>]*)>/);
            if (!rootTag) {
              core.setFailed('Could not find <coverage> root in coverage.xml');
              return;
            }

            const attrs = Object.fromEntries(
              [...rootTag[1].matchAll(/([\w-]+)="([^"]*)"/g)].map(([, key, value]) => [key, value])
            );

            const asPercent = (value) => `${(Number(value || 0) * 100).toFixed(2)}%`;
            const asInt = (value) => Number(value || 0).toLocaleString('en-US');

            const lineRate = asPercent(attrs['line-rate']);
            const branchRate = asPercent(attrs['branch-rate']);
            const linesCovered = asInt(attrs['lines-covered']);
            const linesValid = asInt(attrs['lines-valid']);
            const branchesCovered = asInt(attrs['branches-covered']);
            const branchesValid = asInt(attrs['branches-valid']);

            const summary = [
              '## Coverage',
              '',
              '| Metric | Covered | Total | Rate |',
              '| --- | ---: | ---: | ---: |',
              `| Lines | ${linesCovered} | ${linesValid} | ${lineRate} |`,
              `| Branches | ${branchesCovered} | ${branchesValid} | ${branchRate} |`,
            ].join('\n');

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Coverage',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Coverage Summary',
                summary,
              },
            });

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-reports
          if-no-files-found: warn
          path: |
            target/nextest/ci/junit.xml
            coverage.xml

      - name: Fail if tests or coverage failed
        if: always()
        run: |
          [ "${{ steps.verification.outcome }}" = "success" ] || exit 1
          [ "${{ steps.test_report.outcome }}" = "success" ] || exit 1
          [ "${{ steps.coverage_report.outcome }}" = "success" ] || exit 1
