name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-self-hosted:
    name: Test (self-hosted)
    runs-on:
      - self-hosted
      - linux
      - x64
      - hk-47
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: foodservice
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d foodservice"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Rust CI tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Run nextest with JUnit output
        id: nextest
        continue-on-error: true
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/foodservice
        run: cargo nextest run --workspace --junit-report test-results.xml

      - name: Publish test report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.xml

      - name: Generate Cobertura coverage
        id: coverage
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/foodservice
        run: cargo llvm-cov nextest --workspace --cobertura --output-path coverage.xml

      - name: Publish coverage summary
        if: always() && hashFiles('coverage.xml') != ''
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request' && always() && hashFiles('code-coverage-results.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          if-no-files-found: warn
          path: |
            test-results.xml
            coverage.xml
            code-coverage-results.md

      - name: Fail if tests or coverage failed
        if: always()
        run: |
          [ "${{ steps.nextest.outcome }}" = "success" ] || exit 1
          [ "${{ steps.coverage.outcome }}" = "success" ] || exit 1
